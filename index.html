<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice Session</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="./circle-check-regular-full.svg" alt="" width="50px" />To-Do
        List
        <p>Stay organinized and productive</p>
      </div>

      <div class="addInput">
        <input type="text" placeholder="Add a new task..." />
        <button>+Add</button>
      </div>
      <div class="showList">
        <div class="showContent">
          <p>2</p>
          <p>Active</p>
        </div>
        <div class="showContent">
          <p>1</p>
          <p>Completed</p>
        </div>
        <div class="showContent">
          <p>3</p>
          <p>Total</p>
        </div>
      </div>
      <div class="displayToDo">
        <div class="List">
          <input type="checkbox" />Welcome to you to do list!
        </div>
        <div class="List">
          <input type="checkbox" /> Click the checkbox to mark as complete
        </div>
        <div class="List"><input type="checkbox" />Hover to delete items</div>
      </div>
    </div>
  </body>
</html>
